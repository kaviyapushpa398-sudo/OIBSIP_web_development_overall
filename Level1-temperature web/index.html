<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThermoConvert — Temperature Converter</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-grid"></div>
  <div class="glow-orb glow-orb--1"></div>
  <div class="glow-orb glow-orb--2"></div>

  <main class="wrapper">
    <header class="header">
      <div class="header__icon">🌡️</div>
      <h1 class="header__title">ThermoConvert</h1>
      <p class="header__subtitle">Precision temperature conversion</p>
    </header>

    <div class="card">

      <!-- Input Section -->
      <div class="card__section">
        <label class="field-label" for="tempInput">Temperature Value</label>
        <div class="input-wrap">
          <input
            type="number"
            id="tempInput"
            class="temp-input"
            placeholder="Enter temperature…"
            step="any"
            autocomplete="off"
          />
          <span class="input-unit-badge" id="inputUnitBadge">°C</span>
        </div>
        <p class="error-msg" id="errorMsg" aria-live="polite"></p>
      </div>

      <!-- Unit Selection -->
      <div class="card__section">
        <label class="field-label">Input Unit</label>
        <div class="unit-selector" id="unitSelector" role="group" aria-label="Select input unit">
          <button class="unit-btn active" data-unit="C" type="button">
            <span class="unit-btn__symbol">°C</span>
            <span class="unit-btn__name">Celsius</span>
          </button>
          <button class="unit-btn" data-unit="F" type="button">
            <span class="unit-btn__symbol">°F</span>
            <span class="unit-btn__name">Fahrenheit</span>
          </button>
          <button class="unit-btn" data-unit="K" type="button">
            <span class="unit-btn__symbol">K</span>
            <span class="unit-btn__name">Kelvin</span>
          </button>
        </div>
      </div>

      <!-- Actions -->
      <div class="card__section card__actions">
        <button class="btn btn--primary" id="convertBtn" type="button">
          <span class="btn__text">Convert</span>
          <span class="btn__icon">→</span>
        </button>
        <button class="btn btn--ghost" id="resetBtn" type="button">Reset</button>
      </div>

      <!-- Result Display -->
      <div class="result-area" id="resultArea" aria-live="polite">
        <div class="result-area__inner" id="resultInner">
          <p class="result-area__hint">Enter a value and hit Convert</p>
        </div>
      </div>

      <!-- Results Cards -->
      <div class="result-cards" id="resultCards"></div>

    </div>

    <!-- Live Preview -->
    <div class="live-preview" id="livePreview">
      <span class="live-dot"></span>
      <span id="liveText">Live preview will appear here…</span>
    </div>

    <footer class="footer">
      Built with precision · All conversions are exact
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
